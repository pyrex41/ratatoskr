name: go

# Builds and tests the Go ratatoskr CLI on Linux, macOS and Windows. Unit tests
# exercise the cross-platform helpers + the embedded builders.json on every OS.
# (A full shake needs a Shen host + the kernel callgraph cache, which regenerates
# at runtime; that path is covered by the integration demo, not this matrix.)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - run: go build -o ratatoskr_bin ./...
      - run: go vet ./...
      - run: go test ./...
      - name: targets smoke (no host needed)
        shell: bash
        run: ./ratatoskr_bin targets
