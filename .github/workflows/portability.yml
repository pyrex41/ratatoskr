name: portability

# Verifies the ratatoskr CLI's cross-platform plumbing (launcher resolution +
# .bat/.cmd/.sh wrapping) on Linux, macOS and Windows. Pure-Python helper tests
# — no Shen host or build toolchain required, so the Windows code paths are
# proven on a real Windows runner.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  helpers:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pytest
      - name: Portability unit tests
        run: python -m pytest test_portable.py -q
      - name: Import + targets smoke
        shell: python
        run: |
          import os, sys
          sys.path.insert(0, os.getcwd())  # `shell: python` runs from a temp file
          import ratatoskr_cli as r
          assert r.wrap_executable(["x/build.sh"], is_windows=True)[0] == "sh"
          assert "lisp" in r.load_builders()
          print("ratatoskr smoke OK on", sys.platform)
